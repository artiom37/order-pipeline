services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: order
      POSTGRES_PASSWORD: order
      POSTGRES_DB: order_pipeline
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U order -d order_pipeline"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ./backend
    command: ["/app/api"]
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: "postgres://order:order@postgres:5432/order_pipeline?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      SIMULATOR_URL: "http://simulator:8090"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      simulator:
        condition: service_started

  dispatcher:
    build:
      context: ./backend
    command: ["/app/dispatcher"]
    environment:
      DATABASE_URL: "postgres://order:order@postgres:5432/order_pipeline?sslmode=disable"
      REDIS_ADDR: "redis:6379"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
    command: ["/app/worker"]
    environment:
      DATABASE_URL: "postgres://order:order@postgres:5432/order_pipeline?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      SIMULATOR_URL: "http://simulator:8090"
      WORKER_NAME: "worker-1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      simulator:
        condition: service_started

  simulator:
    build:
      context: ./backend
    command: ["/app/simulator"]
    environment:
      HTTP_ADDR: ":8090"
    ports:
      - "8090:8090"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE: "http://localhost:8080"
    ports:
      - "5173:5173"
    depends_on:
      - api
